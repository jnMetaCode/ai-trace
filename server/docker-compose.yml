# AI-Trace Full Stack Deployment
# Usage: docker compose up -d

version: "3.9"

services:
  # AI-Trace Server
  ai-trace:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-trace-server
    ports:
      - "8006:8006"
    environment:
      - AI_TRACE_DATABASE_HOST=postgres
      - AI_TRACE_DATABASE_PORT=5432
      - AI_TRACE_DATABASE_USER=postgres
      - AI_TRACE_DATABASE_PASSWORD=postgres
      - AI_TRACE_DATABASE_DBNAME=ai_trace
      - AI_TRACE_REDIS_HOST=redis
      - AI_TRACE_REDIS_PORT=6379
      - AI_TRACE_MINIO_ENDPOINT=minio:9000
      - AI_TRACE_MINIO_ACCESS_KEY=minioadmin
      - AI_TRACE_MINIO_SECRET_KEY=minioadmin
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ai-trace-data:/app/data
      - ai-trace-logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - ai-trace-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8006/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: ai-trace-postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=ai_trace
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    restart: unless-stopped
    networks:
      - ai-trace-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ai_trace"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: ai-trace-redis
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    restart: unless-stopped
    networks:
      - ai-trace-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO Object Storage
  minio:
    image: minio/minio:latest
    container_name: ai-trace-minio
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    restart: unless-stopped
    networks:
      - ai-trace-network
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 20s
      retries: 3

  # MinIO Setup (creates bucket on startup)
  minio-setup:
    image: minio/mc:latest
    container_name: ai-trace-minio-setup
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb local/ai-trace --ignore-existing;
      mc anonymous set download local/ai-trace/public;
      echo 'MinIO bucket setup complete';
      exit 0;
      "
    networks:
      - ai-trace-network

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  minio-data:
    driver: local
  ai-trace-data:
    driver: local
  ai-trace-logs:
    driver: local

networks:
  ai-trace-network:
    driver: bridge
