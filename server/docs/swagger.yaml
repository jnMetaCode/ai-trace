        type: string
      disclosed_events:
        description: 披露的事件
        items:
          $ref: '#/definitions/cert.DisclosedEvent'
        type: array
      merkle_proofs:
        description: Merkle证明
        items:
          $ref: '#/definitions/cert.EventMerkleProof'
        type: array
      root_hash:
        type: string
      schema_version:
        type: string
      time_proof:
        allOf:
        - $ref: '#/definitions/cert.TimeProof'
