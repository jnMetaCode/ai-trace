    - healthy
    - degraded
    - unhealthy
    type: string
    x-enum-varnames:
    - HealthStatusHealthy
    - HealthStatusDegraded
    - HealthStatusUnhealthy
  api.IngestEventResult:
    description: 单个事件的写入结果
    properties:
      error:
        description: 错误信息（如有）
        example: duplicate event_id
        type: string
      event_hash:
        description: 事件哈希
        example: sha256:abcd1234...
        type: string
      event_id:
        description: 事件 ID
        example: evt_abc123
        type: string
    type: object
  api.IngestEventsRequest:
    type: object
  api.IngestEventsResponse:
    description: 事件写入的响应结果
    properties:
      results:
        description: 各事件的写入结果
