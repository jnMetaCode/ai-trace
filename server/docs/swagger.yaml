host: localhost:8006
info:
  contact:
    email: support@aitrace.cc
    name: AI-Trace Support
    url: https://aitrace.cc/support
  description: |-
    AI-Trace - Enterprise AI Decision Audit & Compliance Platform

    AI-Trace 提供零代码侵入的 AI 调用追踪、存证和审计能力。
    支持 OpenAI、Claude、Ollama 等多种模型，用户可透传自己的 API Key，服务不存储任何敏感信息。

    ## 特性
    - **零侵入集成**: 只需替换 API endpoint，无需修改代码
    - **API Key 透传**: 用户的 API Key 直接透传到上游，不存储
    - **自定义代理**: 支持用户指定自己的代理服务器
    - **多级存证**: internal(内部审计) / compliance(合规) / legal(法律效力)
    - **最小披露**: 基于 Merkle 树的选择性披露证明
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: https://aitrace.cc/terms
  title: AI-Trace API
  version: 0.2.0
paths:
  /certs/{cert_id}:
    get:
      description: 根据证书 ID 获取存证证书的完整信息
      parameters:
      - description: AI-Trace 平台 API Key
        in: header
        name: X-API-Key
        required: true
        type: string
      - description: 证书 ID
        in: path
        name: cert_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 证书详情
          schema:
            $ref: '#/definitions/cert.Certificate'
        "401":
          description: 未授权
          schema:
            additionalProperties: true
            type: object
        "404":
          description: 证书不存在
          schema:
            additionalProperties: true
            type: object
      security:
      - ApiKeyAuth: []
      summary: 获取存证证书详情
      tags:
      - Certificates
  /certs/{cert_id}/prove:
    post:
      consumes:
      - application/json
      description: |-
        生成只包含必要信息的证明，支持选择性披露

        ## 使用场景
        - 向第三方证明 AI 决策过程，而不暴露完整对话内容
        - 选择性披露特定事件和字段
        - 生成可独立验证的 Merkle 证明
      parameters:
      - description: AI-Trace 平台 API Key
        in: header
        name: X-API-Key
        required: true
        type: string
      - description: 证书 ID
        in: path
        name: cert_id
        required: true
        type: string
      - description: 证明请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/api.GenerateProofRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 最小披露证明
          schema:
            $ref: '#/definitions/cert.MinimalDisclosureProof'
        "400":
          description: 请求无效
          schema:
            additionalProperties: true
            type: object
        "401":
          description: 未授权
          schema:
            additionalProperties: true
            type: object
        "404":
          description: 证书不存在
          schema:
            additionalProperties: true
            type: object
      security:
      - ApiKeyAuth: []
      summary: 生成最小披露证明
      tags:
      - Certificates
  /certs/commit:
    post:
      consumes:
      - application/json
      description: |-
        为指定的追踪生成存证证书，支持多级存证

        ## 存证级别
        - **internal** (L1): Ed25519 签名，适合内部审计
        - **compliance** (L2): WORM 存储 + TSA 时间戳，适合合规要求
        - **legal** (L3): 区块链锚定，适合法律效力要求
      parameters:
      - description: AI-Trace 平台 API Key
        in: header
        name: X-API-Key
        required: true
        type: string
      - description: 存证请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/api.CommitCertRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 存证证书信息
          schema:
            additionalProperties: true
            type: object
        "400":
          description: 请求无效
          schema:
            additionalProperties: true
            type: object
        "401":
          description: 未授权
          schema:
            additionalProperties: true
            type: object
        "404":
          description: 追踪不存在
          schema:
            additionalProperties: true
            type: object
        "500":
          description: 服务器错误
          schema:
            additionalProperties: true
            type: object
      security:
      - ApiKeyAuth: []
      summary: 生成存证证书
      tags:
      - Certificates
  /certs/search:
    get:
      description: 获取当前租户的存证证书列表
      parameters:
      - description: AI-Trace 平台 API Key
        in: header
        name: X-API-Key
        required: true
        type: string
      - default: 1
        description: 页码
        in: query
        name: page
        type: integer
      - default: 20
        description: 每页数量（最大100）
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 证书列表
          schema:
            additionalProperties: true
            type: object
        "401":
          description: 未授权
          schema:
            additionalProperties: true
            type: object
        "500":
          description: 服务器错误
          schema:
            additionalProperties: true
            type: object
      security:
      - ApiKeyAuth: []
      summary: 搜索存证证书
      tags:
      - Certificates
  /certs/verify:
    post:
      consumes:
      - application/json
      description: |-
        验证存证证书的完整性和有效性

        ## 验证项目
        - **hash_integrity**: 事件哈希与 Merkle 根匹配
        - **signature**: Ed25519 数字签名验证
        - **time_proof**: 时间证明验证
        - **anchor_proof**: 锚定证明验证（WORM/区块链）
      parameters:
      - description: AI-Trace 平台 API Key
        in: header
        name: X-API-Key
        required: true
        type: string
      - description: 验证请求（cert_id 或 root_hash 二选一）
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/api.VerifyCertRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 验证结果
          schema:
            additionalProperties: true
            type: object
        "400":
          description: 请求无效
          schema:
            additionalProperties: true
            type: object
        "401":
          description: 未授权
          schema:
            additionalProperties: true
            type: object
        "404":
          description: 证书不存在
          schema:
            additionalProperties: true
            type: object
      security:
      - ApiKeyAuth: []
      summary: 验证存证证书
      tags:
      - Certificates
  /chat/completions:
    post:
      consumes:
      - application/json
      description: |-
        代理 OpenAI/Claude/Ollama 聊天完成请求，同时记录追踪事件

        ## API Key 透传
        用户的 API Key 通过以下方式传递，**不会被存储**：
        - `X-Upstream-API-Key` header（推荐）
        - `Authorization: Bearer sk-...` header（兼容模式）

        ## 自定义代理
        可通过 `X-Upstream-Base-URL` 指定自己的代理服务器，避免 IP 封禁风险
      parameters:
      - description: AI-Trace 平台 API Key
        in: header
        name: X-API-Key
        required: true
        type: string
      - description: 上游 API Key（OpenAI/Claude，透传不存储）
        in: header
        name: X-Upstream-API-Key
        type: string
      - description: 自定义上游代理 URL
        in: header
        name: X-Upstream-Base-URL
        type: string
      - description: 追踪 ID（可选，自动生成）
        in: header
        name: X-Trace-ID
        type: string
      - description: 会话 ID
        in: header
        name: X-Session-ID
        type: string
      - description: 业务 ID
        in: header
        name: X-Business-ID
        type: string
      - description: 聊天请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/gateway.ChatCompletionRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 聊天响应
          headers:
            X-Latency-Ms:
              description: 延迟毫秒数
              type: string
            X-Trace-ID:
              description: 追踪 ID
              type: string
          schema:
            $ref: '#/definitions/gateway.ChatCompletionResponse'
        "400":
          description: 请求无效
          schema:
            additionalProperties: true
            type: object
        "401":
          description: 未授权
          schema:
            additionalProperties: true
            type: object
        "500":
          description: 服务器错误
          schema:
            additionalProperties: true
            type: object
      security:
      - ApiKeyAuth: []
      summary: 聊天完成（OpenAI 兼容）
      tags:
      - Gateway
  /chat/completions/stream:
    post:
      consumes:
      - application/json
      description: |-
        代理 LLM 流式请求，每个 chunk 实时存证并返回

        ## 流式存证特性
        - 每个 chunk 生成独立的 CHUNK 事件
        - 累积哈希保证完整性（任意 chunk 被篡改可检测）
        - 实时返回 chunk 内容和存证信息
      parameters:
      - description: AI-Trace 平台 API Key
        in: header
        name: X-API-Key
        required: true
        type: string
      - description: 上游 API Key（OpenAI/Claude，透传不存储）
        in: header
        name: X-Upstream-API-Key
        type: string
      - description: 自定义上游代理 URL
        in: header
        name: X-Upstream-Base-URL
        type: string
      - description: 追踪 ID（可选，自动生成）
        in: header
        name: X-Trace-ID
        type: string
      - description: 会话 ID
        in: header
        name: X-Session-ID
        type: string
      - description: 业务 ID
        in: header
        name: X-Business-ID
        type: string
      - description: 聊天请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/gateway.ChatCompletionRequest'
      produces:
      - text/event-stream
      responses:
        "200":
          description: SSE stream
          headers:
            X-Trace-ID:
              description: 追踪 ID
              type: string
          schema:
            type: string
        "400":
          description: 请求无效
          schema:
            additionalProperties: true
            type: object
        "401":
          description: 未授权
          schema:
            additionalProperties: true
            type: object
        "500":
          description: 服务器错误
          schema:
            additionalProperties: true
            type: object
      security:
      - ApiKeyAuth: []
      summary: 流式聊天完成（SSE）
      tags:
      - Gateway
  /decrypt:
