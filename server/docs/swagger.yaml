basePath: /api/v1
definitions:
  anchor.FederatedAnchorRequest:
    properties:
      cert_id:
        type: string
      origin_node:
        type: string
      root_hash:
        type: string
      signature:
        type: string
      timestamp:
        type: string
    type: object
  anchor.FederatedAnchorResponse:
    properties:
      accepted:
        type: boolean
      anchor_id:
        type: string
      error:
        type: string
      node_id:
        type: string
      signature:
        type: string
      timestamp:
        type: string
    type: object
  api.CommitCertRequest:
    description: 生成存证证书的请求体
    properties:
      evidence_level:
        description: 存证级别：internal/compliance/legal（或旧格式 L1/L2/L3）
        example: internal
        type: string
      trace_id:
        description: 追踪 ID
        example: trc_abc123
        type: string
    required:
    - trace_id
    type: object
  api.DecryptAuditLog:
    properties:
      audit_log_id:
        type: string
      client_ip:
        type: string
      decrypted_at:
        type: string
      fail_reason:
        type: string
      success:
        type: boolean
      tenant_id:
        type: string
      user_id:
        type: string
    type: object
  api.DecryptAuditLogsResponse:
    properties:
      encrypted_ref:
        type: string
      logs:
        items:
          $ref: '#/definitions/api.DecryptAuditLog'
        type: array
      total_count:
        type: integer
    type: object
  api.DecryptRequest:
    properties:
      content_type:
        description: prompt 或 output
        type: string
      encrypted_ref:
        description: 加密内容引用
        type: string
      trace_id:
