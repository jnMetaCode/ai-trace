    - encrypted_ref
    type: object
  api.DecryptResponse:
    properties:
      audit_log_id:
        description: 审计日志 ID
        type: string
      content:
        description: 解密后的内容
        type: string
      content_type:
        description: 内容类型
        type: string
      decrypted_at:
        description: 解密时间
        type: string
    type: object
  api.DependencyStatus:
    properties:
      last_check:
        type: string
      latency:
        type: string
      message:
        type: string
      status:
        $ref: '#/definitions/api.HealthStatus'
    type: object
  api.FingerprintCompareDetails:
    properties:
      semantic_similarity:
        type: number
      statistical_similarity:
        type: number
      token_prob_similarity:
        type: number
    type: object
  api.FingerprintCompareRequest:
    properties:
      trace_id_1:
        type: string
      trace_id_2:
        type: string
    required:
    - trace_id_1
    - trace_id_2
    type: object
  api.FingerprintCompareResponse:
    properties:
      conclusion:
        type: string
      details:
        $ref: '#/definitions/api.FingerprintCompareDetails'
      similarity:
        type: number
      trace_id_1:
        type: string
      trace_id_2:
        type: string
    type: object
  api.FingerprintResponse:
    properties:
      fingerprint_hash:
        type: string
      fingerprint_id:
        type: string
      generated_at:
        type: string
      model_id:
        type: string
      model_provider:
        type: string
      semantic: {}
      statistical: {}
      token_probs: {}
      trace_id:
        type: string
    type: object
  api.FingerprintVerifyRequest:
    properties:
      fingerprint_hash:
        type: string
      trace_id:
        type: string
    required:
    - trace_id
    type: object
  api.FingerprintVerifyResponse:
    properties:
      message:
        type: string
      trace_id:
        type: string
      valid:
        type: boolean
      verified:
        type: boolean
    type: object
  api.GenerateProofRequest:
    description: 生成最小披露证明的请求体
    properties:
      disclose_events:
        description: 要披露的事件索引（如 [0, 2]）
        items:
          type: integer
        type: array
      disclose_fields:
        description: 要披露的字段（如 ["output_hash"]）
        items:
          type: string
        type: array
    type: object
  api.GenerateReportRequest:
    description: 生成审计报告的请求体
    properties:
      cert_ids:
        description: 指定证书 ID 列表
        items:
          type: string
        type: array
      end_time:
        description: 结束时间
        example: "2024-12-31"
        type: string
      format:
        description: '输出格式: json/html'
        example: html
        type: string
      include_raw:
        description: 是否包含原始数据
        type: boolean
      start_time:
        description: 开始时间
        example: "2024-01-01"
        type: string
      trace_ids:
        description: 指定追踪 ID 列表
        items:
          type: string
        type: array
      type:
        description: '报告类型: audit/compliance/summary'
        example: audit
        type: string
    required:
    - type
    type: object
  api.HealthResponse:
    properties:
      dependencies:
        additionalProperties:
          $ref: '#/definitions/api.DependencyStatus'
        type: object
      status:
        $ref: '#/definitions/api.HealthStatus'
      timestamp:
        type: string
      uptime:
        type: string
      version:
        type: string
    type: object
  api.HealthStatus:
