apiVersion: v1
kind: ConfigMap
metadata:
  name: ai-trace-config
  namespace: ai-trace
  labels:
    app.kubernetes.io/name: ai-trace
data:
  config.yaml: |
    server:
      port: 8080
      mode: release

    database:
      host: postgres-service
      port: 5432
      user: ai_trace
      name: ai_trace
      sslmode: disable
      max_open_conns: 25
      max_idle_conns: 5

    redis:
      host: redis-service
      port: 6379

    minio:
      endpoint: minio-service:9000
      bucket: ai-trace-certs
      use_ssl: false

    gateway:
      timeout: 120
      openai:
        base_url: https://api.openai.com/v1
      ollama:
        base_url: http://ollama-service:11434
