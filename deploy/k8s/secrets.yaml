apiVersion: v1
kind: Secret
metadata:
  name: ai-trace-secrets
  namespace: ai-trace
  labels:
    app.kubernetes.io/name: ai-trace
type: Opaque
stringData:
  # Database credentials
  POSTGRES_PASSWORD: "CHANGE_ME_POSTGRES_PASSWORD"

  # Redis password
  REDIS_PASSWORD: "CHANGE_ME_REDIS_PASSWORD"

  # MinIO credentials
  MINIO_ACCESS_KEY: "ai_trace_admin"
  MINIO_SECRET_KEY: "CHANGE_ME_MINIO_SECRET"

  # AI-Trace API Key
  AI_TRACE_API_KEY: "CHANGE_ME_API_KEY"

  # Ed25519 signing seed (32 bytes hex)
  ED25519_SEED: "CHANGE_ME_ED25519_SEED_HEX_64_CHARS"

  # Optional: OpenAI API Key (if using managed mode)
  # OPENAI_API_KEY: "sk-..."

  # Optional: Blockchain anchoring
  # ETH_RPC_URL: "https://mainnet.infura.io/v3/..."
  # ETH_PRIVATE_KEY: "0x..."
