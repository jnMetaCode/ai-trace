version: '3.8'

services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:15-alpine
    container_name: ai-trace-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_trace
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ai-trace-network

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: ai-trace-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ai-trace-network

  # MinIO 对象存储
  minio:
    image: minio/minio:latest
    container_name: ai-trace-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - ai-trace-network

  # AI-Trace Server
  server:
    build:
      context: ./server
      dockerfile: ../deploy/docker/Dockerfile.server
    container_name: ai-trace-server
    ports:
      - "8080:8080"
    environment:
      - SERVER_PORT=8080
      - SERVER_MODE=debug
      - DATABASE_HOST=postgres
      - DATABASE_PORT=5432
      - DATABASE_USER=postgres
      - DATABASE_PASSWORD=postgres
      - DATABASE_DBNAME=ai_trace
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - MINIO_BUCKET=ai-trace
      - GATEWAY_OPENAI_BASE_URL=https://api.openai.com/v1
      - GATEWAY_OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GATEWAY_OLLAMA_BASE_URL=http://host.docker.internal:11434
      - AUTH_API_KEYS=test-api-key-12345
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - ai-trace-network

  # AI-Trace Console (前端)
  console:
    build:
      context: ./console
      dockerfile: ../deploy/docker/Dockerfile.console
    container_name: ai-trace-console
    ports:
      - "3000:80"
    environment:
      - VITE_API_BASE_URL=http://localhost:8080
    depends_on:
      - server
    networks:
      - ai-trace-network

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  ai-trace-network:
    driver: bridge
